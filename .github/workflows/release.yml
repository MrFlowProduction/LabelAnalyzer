name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Melyik platformra buildeljünk?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - macos-arm
      version:
        description: 'Verziószám (pl. 1.0.0)'
        required: false
        default: 'dev'

jobs:

  # ── Windows ZIP (telepítő nélkül) ──────────────────────────────────────────
  build-windows:
    name: Windows ZIP
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'windows'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 23 telepítése
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build (Windows profil)
        run: mvn -B package -P win -DskipTests

      - name: Target mappa listázása
        shell: bash
        run: ls -la target/

      - name: Fat jar átmásolása
        shell: bash
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "Talált jar: $JAR"
          cp "$JAR" target/label-analyzer-fat.jar

      - name: Verziószám meghatározása
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: jpackage – app-image (telepítő nélküli mappa)
        shell: cmd
        run: |
          jpackage ^
            --input target ^
            --main-jar label-analyzer-fat.jar ^
            --name LabelAnalyzer ^
            --app-version ${{ steps.version.outputs.value }} ^
            --vendor "MrFlow" ^
            --type app-image ^
            --dest dist ^
            --java-options "--add-modules javafx.controls,javafx.fxml"

      - name: dist mappa listázása (debug)
        shell: bash
        run: ls -la dist/ && ls -la dist/LabelAnalyzer/ || true

      - name: ZIP készítése
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist\LabelAnalyzer\*" `
            -DestinationPath "dist\LabelAnalyzer-windows-${{ steps.version.outputs.value }}.zip"

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: dist/*.zip
          retention-days: 30

  # ── macOS Intel ZIP ────────────────────────────────────────────────────────
  build-macos:
    name: macOS Intel ZIP
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 21 telepítése
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Maven build (Mac profil)
        run: mvn -B package -P mac -DskipTests

      - name: Fat jar átmásolása
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "Talált jar: $JAR"
          cp "$JAR" target/label-analyzer-fat.jar

      - name: Verziószám meghatározása
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: jpackage – app-image
        run: |
          jpackage \
            --input target \
            --main-jar label-analyzer-fat.jar \
            --name LabelAnalyzer \
            --app-version ${{ steps.version.outputs.value }} \
            --vendor "MrFlow" \
            --type app-image \
            --dest dist \
            --java-options "--add-modules javafx.controls,javafx.fxml"

      - name: ZIP készítése
        run: |
          cd dist
          zip -r "LabelAnalyzer-macos-${{ steps.version.outputs.value }}.zip" LabelAnalyzer.app

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: macos-zip
          path: dist/*.zip
          retention-days: 30

  # ── macOS ARM ZIP ──────────────────────────────────────────────────────────
  build-macos-arm:
    name: macOS ARM ZIP
    runs-on: macos-14
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos-arm'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 21 telepítése (ARM)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Maven build (Mac ARM profil)
        run: mvn -B package -P mac-aarch64 -DskipTests

      - name: Fat jar átmásolása
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "Talált jar: $JAR"
          cp "$JAR" target/label-analyzer-fat.jar

      - name: Verziószám meghatározása
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: jpackage – app-image
        run: |
          jpackage \
            --input target \
            --main-jar label-analyzer-fat.jar \
            --name LabelAnalyzer \
            --app-version ${{ steps.version.outputs.value }} \
            --vendor "MrFlow" \
            --type app-image \
            --dest dist \
            --java-options "--add-modules javafx.controls,javafx.fxml"

      - name: ZIP készítése
        run: |
          cd dist
          zip -r "LabelAnalyzer-macos-arm-${{ steps.version.outputs.value }}.zip" LabelAnalyzer.app

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm-zip
          path: dist/*.zip
          retention-days: 30

  # ── GitHub Release – csak tag esetén ──────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-windows, build-macos, build-macos-arm]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Artifactok letöltése
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Release létrehozása
        uses: softprops/action-gh-release@v2
        with:
          name: LabelAnalyzer ${{ github.ref_name }}
          body: |
            ## LabelAnalyzer ${{ github.ref_name }}

            ### Letöltések – telepítés nem szükséges, csak csomagold ki!

            | Platform | Fájl |
            |----------|------|
            | Windows 10/11 | `LabelAnalyzer-windows-*.zip` |
            | macOS Intel | `LabelAnalyzer-macos-*.zip` |
            | macOS Apple Silicon | `LabelAnalyzer-macos-arm-*.zip` |

            ### Használat
            **Windows:** Csomagold ki a ZIP-et, majd futtasd a `LabelAnalyzer.exe` fájlt.
            **macOS:** Csomagold ki a ZIP-et, majd húzd a `LabelAnalyzer.app`-ot az Applications mappába.

            > JRE telepítés nem szükséges – a runtime bele van csomagolva.
          files: artifacts/**
          draft: false
          prerelease: false