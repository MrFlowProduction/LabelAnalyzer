name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Melyik platformra buildeljünk?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - macos-arm
      version:
        description: 'Verziószám (pl. 1.0.0)'
        required: false
        default: 'dev'

jobs:

  # ── Windows ZIP – fat jar + JRE + start.bat ─────────────────────────────────
  build-windows:
    name: Windows ZIP
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'windows'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 21 telepítése (build)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build (Windows profil)
        run: mvn -B package -P win -DskipTests

      - name: Verziószám meghatározása
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fat jar megkeresése
        id: jarname
        shell: bash
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "Talált jar: $JAR"
          echo "path=$JAR" >> $GITHUB_OUTPUT
          BASENAME=$(basename "$JAR")
          echo "name=$BASENAME" >> $GITHUB_OUTPUT

      - name: Windows JRE letöltése (Temurin 21)
        shell: pwsh
        run: |
          $url = "https://github.com/adoptium/temurin23-binaries/releases/download/jdk-23.0.2%2B7/OpenJDK23U-jre_x64_windows_hotspot_23.0.2_7.zip"
          Write-Host "JRE letöltése..."
          Invoke-WebRequest -Uri $url -OutFile "jre-windows.zip"
          Write-Host "JRE kicsomagolása..."
          Expand-Archive -Path "jre-windows.zip" -DestinationPath "jre-temp"
          $jreDir = (Get-ChildItem "jre-temp" -Directory | Select-Object -First 1).FullName
          Write-Host "JRE mappa: $jreDir"
          Move-Item $jreDir "runtime"
          Write-Host "runtime\bin tartalma:"
          Get-ChildItem "runtime\bin\" -Filter "*.exe" | Format-Table Name

      - name: JavaFX SDK letöltése (Windows)
        shell: pwsh
        run: |
          $url = "https://download2.gluonhq.com/openjfx/23.0.2/openjfx-23.0.2_windows-x64_bin-sdk.zip"
          Write-Host "JavaFX SDK letöltése..."
          Invoke-WebRequest -Uri $url -OutFile "javafx-sdk.zip"
          Expand-Archive -Path "javafx-sdk.zip" -DestinationPath "javafx-temp"
          $fxDir = (Get-ChildItem "javafx-temp" -Directory | Select-Object -First 1).FullName
          Write-Host "JavaFX mappa: $fxDir"
          Move-Item $fxDir "javafx-sdk"
          Write-Host "JavaFX lib tartalma:"
          Get-ChildItem "javafx-sdk\lib\" -Filter "*.jar" | Format-Table Name

      - name: App mappa összerakása
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "app-dist\runtime" -Force
          New-Item -ItemType Directory -Path "app-dist\app" -Force
          New-Item -ItemType Directory -Path "app-dist\javafx" -Force

          # JRE bemásolása
          Copy-Item -Path "runtime\*" -Destination "app-dist\runtime" -Recurse

          # JavaFX lib bemásolása
          Copy-Item -Path "javafx-sdk\lib\*" -Destination "app-dist\javafx" -Recurse

          # Fat jar bemásolása
          $jarPath = "${{ steps.jarname.outputs.path }}"
          Copy-Item -Path $jarPath -Destination "app-dist\app\app.jar"

          Write-Host "app-dist\runtime\bin tartalma:"
          Get-ChildItem "app-dist\runtime\bin\" -Filter "*.exe" | Format-Table Name
          Write-Host "app-dist\javafx tartalma:"
          Get-ChildItem "app-dist\javafx\" -Filter "*.jar" | Format-Table Name

      - name: start.bat létrehozása
        shell: pwsh
        run: |
          $content = "@echo off`r`n"
          $content += "cd /d `"%~dp0`"`r`n"
          $content += "echo LabelAnalyzer inditasa...`r`n"
          $content += "mkdir `"%USERPROFILE%\.labelanalyzer\logs`" 2>nul`r`n"
          $content += "runtime\bin\javaw.exe ^`r`n"
          $content += "  --add-modules javafx.controls,javafx.fxml ^`r`n"
          $content += "  -jar `"app\app.jar`"`r`n"
          [System.IO.File]::WriteAllText("app-dist\LabelAnalyzer.bat", $content, [System.Text.Encoding]::ASCII)

          # Debug verzio: konzol ablakkal es log fajllal
          $debug = "@echo off`r`n"
          $debug += "cd /d `"%~dp0`"`r`n"
          $debug += "mkdir `"%USERPROFILE%\.labelanalyzer\logs`" 2>nul`r`n"
          $debug += "echo Inditasi log: %USERPROFILE%\.labelanalyzer\logs\startup.log`r`n"
          $debug += "runtime\bin\java.exe ^`r`n"
          $debug += "  --add-modules javafx.controls,javafx.fxml ^`r`n"
          $debug += "  -jar `"app\app.jar`" ^`r`n"
          $debug += "  > `"%USERPROFILE%\.labelanalyzer\logs\startup.log`" 2>&1`r`n"
          $debug += "echo Kilepes kodja: %ERRORLEVEL%`r`n"
          $debug += "type `"%USERPROFILE%\.labelanalyzer\logs\startup.log`"`r`n"
          $debug += "pause`r`n"
          [System.IO.File]::WriteAllText("app-dist\debug.bat", $debug, [System.Text.Encoding]::ASCII)

          Write-Host "LabelAnalyzer.bat:"
          Get-Content "app-dist\LabelAnalyzer.bat"
          Write-Host "debug.bat:"
          Get-Content "app-dist\debug.bat"

      - name: ZIP készítése
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "app-dist\*" `
            -DestinationPath "LabelAnalyzer-windows-${{ steps.version.outputs.value }}.zip"
          $size = (Get-Item "LabelAnalyzer-windows-${{ steps.version.outputs.value }}.zip").Length / 1MB
          Write-Host "ZIP mérete: $([math]::Round($size, 1)) MB"

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: LabelAnalyzer-windows-*.zip
          retention-days: 30

  # ── macOS Intel ZIP ─────────────────────────────────────────────────────────
  build-macos:
    name: macOS Intel ZIP
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 21 telepítése
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build (Mac profil)
        run: mvn -B package -P mac -DskipTests

      - name: Verziószám meghatározása
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fat jar megkeresése
        id: jarname
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "Talált jar: $JAR"
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: macOS JRE letöltése (Temurin 21)
        run: |
          URL="https://github.com/adoptium/temurin23-binaries/releases/download/jdk-23.0.2%2B7/OpenJDK23U-jre_x64_mac_hotspot_23.0.2_7.tar.gz"
          curl -L -o jre-mac.tar.gz "$URL"
          tar -xzf jre-mac.tar.gz
          JRE_DIR=$(ls -d */ | grep -i jdk | head -1)
          echo "JRE mappa: $JRE_DIR"
          mv "$JRE_DIR" runtime

      - name: App mappa összerakása és ZIP
        run: |
          mkdir -p app-dist/runtime app-dist/app
          cp -r runtime/* app-dist/runtime/
          cp "${{ steps.jarname.outputs.path }}" app-dist/app/app.jar

          cat > app-dist/LabelAnalyzer.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          "$DIR/runtime/Contents/Home/bin/java" \
            --add-modules javafx.controls,javafx.fxml \
            -jar "$DIR/app/app.jar"
          EOF
          chmod +x app-dist/LabelAnalyzer.sh

          cd app-dist
          zip -r "../LabelAnalyzer-macos-${{ steps.version.outputs.value }}.zip" .

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: macos-zip
          path: LabelAnalyzer-macos-*.zip
          retention-days: 30

  # ── macOS ARM ZIP ───────────────────────────────────────────────────────────
  build-macos-arm:
    name: macOS ARM ZIP
    runs-on: macos-14
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos-arm'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 21 telepítése (ARM)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build (Mac ARM profil)
        run: mvn -B package -P mac-aarch64 -DskipTests

      - name: Verziószám meghatározása
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fat jar megkeresése
        id: jarname
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: macOS ARM JRE letöltése (Temurin 21)
        run: |
          URL="https://github.com/adoptium/temurin23-binaries/releases/download/jdk-23.0.2%2B7/OpenJDK23U-jre_aarch64_mac_hotspot_23.0.2_7.tar.gz"
          curl -L -o jre-mac-arm.tar.gz "$URL"
          tar -xzf jre-mac-arm.tar.gz
          JRE_DIR=$(ls -d */ | grep -i jdk | head -1)
          mv "$JRE_DIR" runtime

      - name: App mappa összerakása és ZIP
        run: |
          mkdir -p app-dist/runtime app-dist/app
          cp -r runtime/* app-dist/runtime/
          cp "${{ steps.jarname.outputs.path }}" app-dist/app/app.jar

          cat > app-dist/LabelAnalyzer.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          "$DIR/runtime/Contents/Home/bin/java" \
            --add-modules javafx.controls,javafx.fxml \
            -jar "$DIR/app/app.jar"
          EOF
          chmod +x app-dist/LabelAnalyzer.sh

          cd app-dist
          zip -r "../LabelAnalyzer-macos-arm-${{ steps.version.outputs.value }}.zip" .

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm-zip
          path: LabelAnalyzer-macos-arm-*.zip
          retention-days: 30

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-windows, build-macos, build-macos-arm]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Artifactok letöltése
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Release létrehozása
        uses: softprops/action-gh-release@v2
        with:
          name: LabelAnalyzer ${{ github.ref_name }}
          body: |
            ## LabelAnalyzer ${{ github.ref_name }}

            ### Letöltések – telepítés nem szükséges, csak csomagold ki!

            | Platform | Fájl | Indítás |
            |----------|------|---------|
            | Windows 10/11 | `LabelAnalyzer-windows-*.zip` | `LabelAnalyzer.bat` |
            | Windows (debug) | ugyanaz | `debug.bat` (konzol + log) |
            | macOS Intel | `LabelAnalyzer-macos-*.zip` | `LabelAnalyzer.sh` |
            | macOS Apple Silicon | `LabelAnalyzer-macos-arm-*.zip` | `LabelAnalyzer.sh` |

            > JRE telepítés nem szükséges – a runtime bele van csomagolva.
          files: artifacts/**
          draft: false
          prerelease: false