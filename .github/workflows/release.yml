name: Release

on:
  # Automatikus: tag feltölésekor
  push:
    tags:
      - 'v*'

  # Kézi indítás a GitHub Actions felületéről
  workflow_dispatch:
    inputs:
      platform:
        description: 'Melyik platformra buildeljünk?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - macos-arm
      version:
        description: 'Verziószám (pl. 1.0.0) – Release csak tag esetén jön létre'
        required: false
        default: 'dev'

# ── Segéd expression-ök a platform szűréshez ──────────────────────────────
# A job-ok "if" feltételével döntjük el melyik fut.
# Automatikus tagnél mindig minden fut.

jobs:

  # ── Windows EXE ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'windows'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 23 telepítése
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build (Windows profil)
        run: mvn -B package -P win -DskipTests

      - name: Verziószám meghatározása
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fat jar átnevezése
        shell: bash
        run: |
          mv target/label-analyzer-*-fat.jar target/label-analyzer-fat.jar || mv target/label-analyzer-fat.jar target/label-analyzer-fat.jar || true

      - name: jpackage – Windows EXE
        run: |
          jpackage `
            --input target `
            --main-jar label-analyzer-fat.jar `
            --name LabelAnalyzer `
            --app-version ${{ steps.version.outputs.value }} `
            --vendor "MrFlow" `
            --description "Növényvédő szer engedélyelemző" `
            --type exe `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --dest dist `
            --java-options "--add-modules javafx.controls,javafx.fxml"

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: windows-exe
          path: dist/*.exe
          retention-days: 30

  # ── macOS Intel DMG ────────────────────────────────────────────────────────
  build-macos:
    name: macOS Intel DMG
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 23 telepítése
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build (Mac profil)
        run: mvn -B package -P mac -DskipTests

      - name: Verziószám meghatározása
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: jpackage – macOS DMG
        run: |
          jpackage \
            --input target \
            --main-jar label-analyzer-fat.jar \
            --name LabelAnalyzer \
            --app-version ${{ steps.version.outputs.value }} \
            --vendor "MrFlow" \
            --type dmg \
            --dest dist \
            --java-options "--add-modules javafx.controls,javafx.fxml"

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: dist/*.dmg
          retention-days: 30

  # ── macOS ARM DMG ──────────────────────────────────────────────────────────
  build-macos-arm:
    name: macOS ARM DMG
    runs-on: macos-14
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos-arm'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 23 telepítése (ARM)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build (Mac ARM profil)
        run: mvn -B package -P mac-aarch64 -DskipTests

      - name: Verziószám meghatározása
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: jpackage – macOS ARM DMG
        run: |
          jpackage \
            --input target \
            --main-jar label-analyzer-fat.jar \
            --name LabelAnalyzer \
            --app-version ${{ steps.version.outputs.value }} \
            --vendor "MrFlow" \
            --type dmg \
            --dest dist \
            --java-options "--add-modules javafx.controls,javafx.fxml"

      - name: Artifact feltöltése
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm-dmg
          path: dist/*.dmg
          retention-days: 30

  # ── GitHub Release – csak tag esetén ──────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-windows, build-macos, build-macos-arm]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Artifactok letöltése
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Release létrehozása
        uses: softprops/action-gh-release@v2
        with:
          name: LabelAnalyzer ${{ github.ref_name }}
          body: |
            ## LabelAnalyzer ${{ github.ref_name }}

            ### Letöltések
            | Platform | Fájl |
            |----------|------|
            | Windows 10/11 | `LabelAnalyzer-*.exe` |
            | macOS Intel | `LabelAnalyzer-*-mac.dmg` |
            | macOS Apple Silicon | `LabelAnalyzer-*-arm.dmg` |

            ### Telepítés
            **Windows:** Futtasd az `.exe` telepítőt – JRE nem szükséges.
            **macOS:** Nyisd meg a `.dmg` fájlt és húzd az Applications mappába.
          files: artifacts/**
          draft: false
          prerelease: false