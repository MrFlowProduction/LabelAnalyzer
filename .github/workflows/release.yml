name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Melyik platformra buildeljunk?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - macos-arm
      version:
        description: 'Verzioszam (pl. 1.0.0)'
        required: false
        default: 'dev'

jobs:

  build-windows:
    name: Windows ZIP
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'windows'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 23 telepitese
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build
        run: mvn -B package -P win -DskipTests

      - name: Verzioszam meghatározasa
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fat jar atmasolasa
        shell: bash
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "Jar: $JAR"
          echo "path=$JAR" >> $GITHUB_OUTPUT
        id: jarname

      - name: Temurin 23 JRE letoltese
        shell: pwsh
        run: |
          $url = "https://github.com/adoptium/temurin23-binaries/releases/download/jdk-23.0.2%2B7/OpenJDK23U-jre_x64_windows_hotspot_23.0.2_7.zip"
          Invoke-WebRequest -Uri $url -OutFile "jre.zip"
          Expand-Archive -Path "jre.zip" -DestinationPath "jre-temp"
          $jreDir = (Get-ChildItem "jre-temp" -Directory | Select-Object -First 1).FullName
          Move-Item $jreDir "runtime"
          Write-Host "JRE bin:"
          Get-ChildItem "runtime\bin\" -Filter "*.exe" | Format-Table Name

      - name: JavaFX 23 SDK letoltese
        shell: pwsh
        run: |
          $url = "https://download2.gluonhq.com/openjfx/23.0.2/openjfx-23.0.2_windows-x64_bin-sdk.zip"
          Invoke-WebRequest -Uri $url -OutFile "javafx.zip"
          Expand-Archive -Path "javafx.zip" -DestinationPath "javafx-temp"
          $fxDir = (Get-ChildItem "javafx-temp" -Directory | Select-Object -First 1).FullName
          Move-Item $fxDir "javafx-sdk"

      - name: App mappa osszerakasa
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "app-dist\runtime" -Force | Out-Null
          New-Item -ItemType Directory -Path "app-dist\app"     -Force | Out-Null
          New-Item -ItemType Directory -Path "app-dist\javafx"  -Force | Out-Null
          Copy-Item -Path "runtime\*"          -Destination "app-dist\runtime" -Recurse -Force
          Copy-Item -Path "javafx-sdk\lib\*"   -Destination "app-dist\javafx"  -Recurse -Force
          Copy-Item -Path "javafx-sdk\bin\*"   -Destination "app-dist\javafx"  -Recurse -Force
          Copy-Item -Path "${{ steps.jarname.outputs.path }}" -Destination "app-dist\app\app.jar"
          Write-Host "javafx dll-ek:"
          Get-ChildItem "app-dist\javafx\" -Filter "*.dll" | Format-Table Name

      - name: ICO generalasa
        shell: pwsh
        run: |
          pip install pillow --quiet
          python scripts/make_ico.py

      - name: Launch4j config generalasa
        shell: pwsh
        run: python scripts/make_launch4j_config.py "${{ steps.version.outputs.value }}"

      - name: LabelAnalyzer.exe generalasa Maven Launch4j pluginnel
        shell: cmd
        run: |
          mvn -B com.akathist.maven.plugins.launch4j:launch4j-maven-plugin:2.5.0:launch4j -Dlaunch4j.configFile=launch4j-config.xml
          if exist app-dist\LabelAnalyzer.exe (
            echo LabelAnalyzer.exe elkeszult
          ) else (
            echo HIBA: LabelAnalyzer.exe nem jott letre
            exit /b 1
          )

      - name: Batch fajlok generalasa
        shell: pwsh
        run: python scripts/make_bat.py

      - name: ZIP keszitese
        shell: pwsh
        run: |
          Compress-Archive -Path "app-dist\*" -DestinationPath "LabelAnalyzer-windows-${{ steps.version.outputs.value }}.zip"
          $size = (Get-Item "LabelAnalyzer-windows-${{ steps.version.outputs.value }}.zip").Length / 1MB
          Write-Host "ZIP: $([math]::Round($size, 1)) MB"

      - name: Artifact feltoltese
        uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: LabelAnalyzer-windows-*.zip
          retention-days: 30

  build-macos:
    name: macOS Intel ZIP
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 23 telepitese
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build
        run: mvn -B package -P mac -DskipTests

      - name: Verzioszam
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fat jar megkeresese
        id: jarname
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: JRE letoltese
        run: |
          URL="https://github.com/adoptium/temurin23-binaries/releases/download/jdk-23.0.2%2B7/OpenJDK23U-jre_x64_mac_hotspot_23.0.2_7.tar.gz"
          curl -L -o jre.tar.gz "$URL"
          tar -xzf jre.tar.gz
          mv $(ls -d */ | grep -i jdk | head -1) runtime

      - name: JavaFX SDK letoltese
        run: |
          URL="https://download2.gluonhq.com/openjfx/23.0.2/openjfx-23.0.2_osx-x64_bin-sdk.zip"
          curl -L -o javafx.zip "$URL"
          unzip -q javafx.zip
          mv $(ls -d */ | grep -i javafx | head -1) javafx-sdk

      - name: App osszerakasa es ZIP
        run: |
          mkdir -p app-dist/runtime app-dist/app app-dist/javafx
          cp -r runtime/* app-dist/runtime/
          cp -r javafx-sdk/lib/* app-dist/javafx/
          cp "${{ steps.jarname.outputs.path }}" app-dist/app/app.jar
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nexport DYLD_LIBRARY_PATH="$DIR/javafx:$DYLD_LIBRARY_PATH"\n"$DIR/runtime/Contents/Home/bin/java" --module-path "$DIR/javafx" --add-modules javafx.controls,javafx.fxml -jar "$DIR/app/app.jar"\n' > app-dist/LabelAnalyzer.sh
          chmod +x app-dist/LabelAnalyzer.sh
          cd app-dist && zip -r "../LabelAnalyzer-macos-${{ steps.version.outputs.value }}.zip" .

      - name: Artifact feltoltese
        uses: actions/upload-artifact@v5
        with:
          name: macos-zip
          path: LabelAnalyzer-macos-*.zip
          retention-days: 30

  build-macos-arm:
    name: macOS ARM ZIP
    runs-on: macos-14
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'macos-arm'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 23 telepitese
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Maven build
        run: mvn -B package -P mac-aarch64 -DskipTests

      - name: Verzioszam
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fat jar megkeresese
        id: jarname
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: JRE letoltese
        run: |
          URL="https://github.com/adoptium/temurin23-binaries/releases/download/jdk-23.0.2%2B7/OpenJDK23U-jre_aarch64_mac_hotspot_23.0.2_7.tar.gz"
          curl -L -o jre.tar.gz "$URL"
          tar -xzf jre.tar.gz
          mv $(ls -d */ | grep -i jdk | head -1) runtime

      - name: JavaFX SDK letoltese
        run: |
          URL="https://download2.gluonhq.com/openjfx/23.0.2/openjfx-23.0.2_osx-aarch64_bin-sdk.zip"
          curl -L -o javafx.zip "$URL"
          unzip -q javafx.zip
          mv $(ls -d */ | grep -i javafx | head -1) javafx-sdk

      - name: App osszerakasa es ZIP
        run: |
          mkdir -p app-dist/runtime app-dist/app app-dist/javafx
          cp -r runtime/* app-dist/runtime/
          cp -r javafx-sdk/lib/* app-dist/javafx/
          cp "${{ steps.jarname.outputs.path }}" app-dist/app/app.jar
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nexport DYLD_LIBRARY_PATH="$DIR/javafx:$DYLD_LIBRARY_PATH"\n"$DIR/runtime/Contents/Home/bin/java" --module-path "$DIR/javafx" --add-modules javafx.controls,javafx.fxml -jar "$DIR/app/app.jar"\n' > app-dist/LabelAnalyzer.sh
          chmod +x app-dist/LabelAnalyzer.sh
          cd app-dist && zip -r "../LabelAnalyzer-macos-arm-${{ steps.version.outputs.value }}.zip" .

      - name: Artifact feltoltese
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm-zip
          path: LabelAnalyzer-macos-arm-*.zip
          retention-days: 30

  release:
    name: GitHub Release
    needs: [build-windows, build-macos, build-macos-arm]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Artifactok letoltese
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Release letrehozasa
        uses: softprops/action-gh-release@v2
        with:
          name: LabelAnalyzer ${{ github.ref_name }}
          body: |
            ## LabelAnalyzer ${{ github.ref_name }}

            ### Letoltesek - telepites nem szukseges, csak csomagold ki!

            | Platform | Fajl | Inditas |
            |----------|------|---------|
            | Windows 10/11 | LabelAnalyzer-windows-*.zip | LabelAnalyzer.exe |
            | Windows debug | ugyanaz | debug.bat |
            | macOS Intel | LabelAnalyzer-macos-*.zip | LabelAnalyzer.sh |
            | macOS Apple Silicon | LabelAnalyzer-macos-arm-*.zip | LabelAnalyzer.sh |

            > JRE es JavaFX nem szukseges - minden bele van csomagolva.
          files: artifacts/**
          draft: false
          prerelease: false